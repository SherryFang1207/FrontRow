# Render Blueprint — one-click deploy from GitHub
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: frontrow
    runtime: node
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Set to your app URL after first deploy (e.g. https://frontrow-xxxx.onrender.com)
      - key: APP_URL
        sync: false
      - key: LASTFM_API_KEY
        sync: false
      - key: TINYFISH_API_KEY
        sync: false
      # Build-time: so frontend calls same-origin /api (leave empty)
      - key: VITE_API_BASE
        value: ""
